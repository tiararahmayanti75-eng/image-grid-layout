<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="gallery-container">
        <header class="gallery-header">
            <h1>Galeri Fotografi</h1>
            <p>Eksplorasi tata letak grid responsif menggunakan CSS Grid Layout.</p>
        </header>

        <div class="image-grid">
            <div class="grid-item card-wide">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Pemandangan Alam Semesta">
            </div>
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1511576661531-b34d7da5d0bb?auto=format&fit=crop&w=500&q=80" alt="Pegunungan">
            </div>
            <div class="grid-item card-tall">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80" alt="Pantai Tropis">
            </div>
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=500&q=80" alt="Kabut Hutan">
            </div>
            <div class="grid-item card-wide">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=800&q=80" alt="Jembatan Kayu Alam">
            </div>
            
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=500&q=80" alt="Lembah Hijau">
            </div>
            
            <div class="grid-item card-tall">
                <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&w=500&q=80" alt="Mobil di Jalanan Hutan">
            </div>
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=500&q=80" alt="Bukit Senja">
            </div>
        </div>
    </main>

</body>
</html>
